<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Application-aware firewall policy model</title>
  <desc id="desc">A conceptual diagram showing how user, device, application identity, URL category, decryption, and security profiles combine into application-aware enforcement.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0071e3"/>
      <stop offset="1" stop-color="#23a6d5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1d1d1f" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#5f6168"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="0" fill="#fbfbfc"/>
  <rect x="76" y="70" width="1128" height="580" rx="22" fill="url(#panel)" stroke="#d9e4f2"/>
  <text x="116" y="128" fill="#1d1d1f" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">From URL Rules to Application Intent</text>
  <text x="116" y="168" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="19">A modern policy evaluates identity, application behavior, content risk, and business purpose before permitting traffic.</text>

  <g filter="url(#shadow)">
    <rect x="114" y="238" width="210" height="230" rx="16" fill="#ffffff" stroke="#e0e4ea"/>
    <text x="142" y="285" fill="#1d1d1f" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Request Context</text>
    <text x="142" y="327" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">User group</text>
    <text x="142" y="362" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">Device posture</text>
    <text x="142" y="397" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">Source zone</text>
    <text x="142" y="432" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">Destination risk</text>

    <rect x="396" y="216" width="232" height="274" rx="16" fill="#ffffff" stroke="#e0e4ea"/>
    <text x="426" y="264" fill="#1d1d1f" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">App-ID</text>
    <text x="426" y="306" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">Identify the application</text>
    <text x="426" y="341" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">across port, protocol,</text>
    <text x="426" y="376" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">IP, and encryption shifts.</text>
    <rect x="426" y="415" width="150" height="42" rx="21" fill="#eef6ff"/>
    <text x="453" y="442" fill="#0071e3" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">business app</text>

    <rect x="700" y="216" width="232" height="274" rx="16" fill="#ffffff" stroke="#e0e4ea"/>
    <text x="730" y="264" fill="#1d1d1f" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Inspection Stack</text>
    <text x="730" y="306" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">SSL decryption where</text>
    <text x="730" y="341" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">appropriate, URL risk,</text>
    <text x="730" y="376" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">threat prevention, DNS,</text>
    <text x="730" y="411" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">file and data controls.</text>

    <rect x="1004" y="238" width="210" height="230" rx="16" fill="#ffffff" stroke="#e0e4ea"/>
    <text x="1032" y="285" fill="#1d1d1f" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Decision</text>
    <text x="1032" y="327" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">Allow least privilege</text>
    <text x="1032" y="362" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">Block risky behavior</text>
    <text x="1032" y="397" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">Log application context</text>
    <text x="1032" y="432" fill="#5f6168" font-family="Arial, Helvetica, sans-serif" font-size="17">Refine continuously</text>
  </g>

  <path d="M338 353 H374" stroke="#5f6168" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M642 353 H678" stroke="#5f6168" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <path d="M946 353 H982" stroke="#5f6168" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <rect x="116" y="548" width="1048" height="54" rx="27" fill="url(#accent)"/>
  <text x="155" y="582" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Policy intent:</text>
  <text x="270" y="582" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="19">Permit the sanctioned application for the right user and asset, then inspect the allowed session deeply.</text>
</svg>
